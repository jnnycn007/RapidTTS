name: Push rapidtts to pypi

on:
  push:
    tags:
      - v*

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Download model
        run: python -m rapidtts.cli download melo_onnx

      - name: Run tests
        run: pytest tests/*.py

  build:
      name: Build distributions
      needs: test
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Set up Python
          uses: actions/setup-python@v6
          with:
            python-version: "3.10"
            cache: pip
            cache-dependency-path: requirements.txt

        - name: Install build dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install get_pypi_latest_version

        - name: Build package
          run: python setup.py bdist_wheel ${{ github.ref_name }}

        - name: Upload distributions
          uses: actions/upload-artifact@v4
          with:
            name: python-package-distributions
            path: dist/

  publish:
      name: Publish to PyPI
      needs: build
      runs-on: ubuntu-latest
      environment:
        name: pypi
        url: https://pypi.org/project/rapidtts/
      permissions:
        contents: read
        id-token: write

      steps:
        - name: Download distributions
          uses: actions/download-artifact@v4
          with:
            name: python-package-distributions
            path: dist/

        - name: Publish distributions to PyPI
          uses: pypa/gh-action-pypi-publish@release/v1